<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Terracotta background -->
  <circle cx="200" cy="200" r="195" fill="#0a0604"/>
  <circle cx="200" cy="200" r="182" fill="#c8793a"/>

  <!-- Inner border ring -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="#1a0a05" stroke-width="2.5"/>
  <circle cx="200" cy="200" r="165" fill="none" stroke="#1a0a05" stroke-width="1.5"/>

  <!-- Black-figure centaur - profile, walking right, arm extended -->
  <g fill="#1a0a05" stroke="none">

    <!-- HORSE BODY - barrel shape, walking pose -->
    <ellipse cx="210" cy="245" rx="75" ry="38"/>

    <!-- Horse back line - slight curve -->
    <path d="M 135,238 C 160,220 240,218 285,235"/>

    <!-- Horse belly -->
    <path d="M 145,260 C 170,278 250,280 280,262"/>

    <!-- REAR LEGS - walking stride -->
    <!-- Rear leg back -->
    <path d="M 268,265 L 285,300 L 290,330 L 295,340
             L 285,342 L 282,332 L 275,300 L 258,268"
          stroke="#1a0a05" stroke-width="1"/>
    <!-- Rear leg forward -->
    <path d="M 248,270 L 238,300 L 232,330 L 228,340
             L 238,342 L 240,332 L 244,302 L 252,272"
          stroke="#1a0a05" stroke-width="1"/>

    <!-- FRONT LEGS - striding -->
    <!-- Front leg back -->
    <path d="M 165,268 L 172,300 L 178,330 L 180,340
             L 170,342 L 168,332 L 162,300 L 155,268"
          stroke="#1a0a05" stroke-width="1"/>
    <!-- Front leg forward - extended -->
    <path d="M 148,262 L 128,290 L 112,320 L 108,338
             L 118,340 L 120,325 L 132,295 L 150,265"
          stroke="#1a0a05" stroke-width="1"/>

    <!-- TAIL - flowing behind -->
    <path d="M 285,232 C 298,225 310,228 315,222 C 320,216 312,210 305,215
             C 298,220 295,225 288,230"/>
    <path d="M 315,222 C 325,215 328,220 322,226" />

    <!-- HUMAN TORSO - rising from front of horse body, upright -->
    <path d="M 148,240 C 142,220 138,195 136,170
             C 134,150 136,130 142,120
             C 148,112 158,112 164,120
             C 170,132 170,155 168,178
             C 166,200 162,222 158,240"/>

    <!-- NECK -->
    <path d="M 142,125 C 140,115 140,105 144,98
             L 160,98 C 162,105 162,115 160,125"/>

    <!-- HEAD - Greek profile, facing right -->
    <path d="M 144,98 C 140,95 135,88 134,78
             C 133,68 138,60 145,57
             C 152,54 160,56 164,62
             C 168,68 168,78 165,88
             C 163,94 160,98 158,98 Z"/>

    <!-- Nose/face profile bump -->
    <path d="M 134,78 C 130,75 128,70 130,65 C 132,62 135,60 138,60"/>

    <!-- HAIR - long, flowing behind like in the pottery -->
    <path d="M 148,57 C 145,50 148,45 155,44
             C 162,43 168,48 168,55"/>
    <!-- Hair flowing down back -->
    <path d="M 155,44 C 158,40 162,38 165,42
             C 170,48 172,60 170,75
             C 168,90 164,105 158,118
             C 155,125 150,130 146,128
             C 142,125 140,118 142,110
             C 144,100 148,88 150,78
             C 152,68 152,55 148,50"/>
    <!-- Extra hair volume -->
    <path d="M 165,42 C 175,45 180,55 178,70
             C 176,85 170,100 165,115
             C 162,125 158,130 155,128"/>

    <!-- EYE - terracotta showing through -->
    <circle cx="142" cy="72" r="4" fill="#c8793a"/>
    <circle cx="142" cy="72" r="2" fill="#1a0a05"/>

    <!-- EXTENDED ARM - reaching forward and up to hold bolt -->
    <path d="M 145,135 C 132,128 115,118 98,108
             C 88,102 78,96 70,90"
          fill="none" stroke="#1a0a05" stroke-width="9" stroke-linecap="round"/>
    <!-- Forearm -->
    <path d="M 70,90 C 64,84 58,76 54,68"
          fill="none" stroke="#1a0a05" stroke-width="8" stroke-linecap="round"/>
    <!-- Fist -->
    <circle cx="54" cy="66" r="6"/>

    <!-- OTHER ARM - down at side / behind -->
    <path d="M 158,138 C 168,148 175,160 178,172"
          fill="none" stroke="#1a0a05" stroke-width="7" stroke-linecap="round"/>
    <path d="M 178,172 C 180,180 180,188 178,192"
          fill="none" stroke="#1a0a05" stroke-width="6" stroke-linecap="round"/>

  </g>

  <!-- === LIGHTNING BOLT - massive, jagged, held in extended fist === -->
  <g fill="#edc967" stroke="#1a0a05" stroke-width="1.5" stroke-linejoin="miter">
    <!-- Main bolt - big angular zigzag from fist upward and outward -->
    <polygon points="
      54,66
      42,52
      52,54
      32,32
      50,40
      28,14
      56,38
      48,22
      68,48
      58,36
      74,58
      62,50
    "/>

    <!-- Upper fork splitting left -->
    <polygon points="
      28,14
      16,8
      22,18
      10,16
      24,24
      18,22
      32,32
    "/>

    <!-- Upper fork splitting right -->
    <polygon points="
      28,14
      38,6
      34,16
      44,10
      36,22
      40,18
      32,32
    "/>

    <!-- Energy crackles -->
    <line x1="16" y1="8" x2="10" y2="2" stroke="#edc967" stroke-width="2" fill="none"/>
    <line x1="38" y1="6" x2="42" y2="0" stroke="#edc967" stroke-width="2" fill="none"/>
    <line x1="10" y1="16" x2="4" y2="12" stroke="#edc967" stroke-width="1.5" fill="none"/>
    <line x1="44" y1="10" x2="50" y2="4" stroke="#edc967" stroke-width="1.5" fill="none"/>
  </g>

</svg>